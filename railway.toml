[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @hackjudge/shared build && pnpm --filter @hackjudge/config-engine build && pnpm --filter @hackjudge/db build && pnpm --filter @hackjudge/api build"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
